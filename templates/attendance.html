{% extends "base.html" %}
{% block title %}Attendance - Krishna English School ERP{% endblock %}
{% block crumbs %}<i data-lucide="calendar-check"></i><span>Attendance</span>{% endblock %}
{% block content %}
<section class="card glass filters"><div class="filter-row">
  <div class="filter-field"><label>Attendance Type</label><select id="attendance-type"><option value="student">Student</option><option value="teacher">Teacher</option></select></div>
  <div class="filter-field student-filter"><label>Class</label><select id="filter-class"><option value="">All Classes</option>{% for c in CLASS_LEVELS %}<option>{{ c }}</option>{% endfor %}</select></div>
  <div class="filter-field student-filter"><label>Section</label><select id="filter-section"><option value="">All Sections</option>{% for s in SECTIONS %}<option>{{ s }}</option>{% endfor %}</select></div>
  <div class="filter-field teacher-filter" hidden><label>Department</label><input id="filter-department" placeholder="All departments"></div>
  <div class="filter-field teacher-filter" hidden><label>Designation</label><input id="filter-designation" placeholder="All designations"></div>
  <div class="filter-field"><label>Date</label><input id="filter-date" type="date"></div>
</div></section>
<section class="card glass"><div class="card-head"><h2 id="attendance-heading">Student Attendance</h2><span id="attendance-count" class="muted small"></span></div><div class="table-scroll"><table id="enterprise-attendance-table"><thead></thead><tbody><tr><td class="empty">Loading attendance...</td></tr></tbody></table></div></section>
{% endblock %}
{% block scripts %}<script src="{{ url_for('static', filename='attendance_v2.js') }}"></script>{% endblock %}
